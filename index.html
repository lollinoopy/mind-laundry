<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>감정쓰레기통🗑️</title>
    <style>
        :root { 
            --bg: #fdf1e8; --paper: #ffffff; --accent: #ff9e9e; 
            --text-main: #5d5d5d; 
        }

        body { 
            background-color: var(--bg); margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden; touch-action: none;
        }

        /* 1페이지, 2페이지 공통 설정 */
        .page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            transition: all 0.5s ease-in-out; /* 부드러운 전환 효과 */
        }

        /* --- [1페이지: 메인] --- */
        #start-page { z-index: 10; opacity: 1; }
        #bin-icon { font-size: 6rem; cursor: pointer; margin-bottom: 30px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        #bin-icon:active { transform: scale(0.9); }
        .description-box { width: 80%; max-width: 400px; text-align: center; color: var(--text-main); line-height: 1.7; }

        /* --- [2페이지: 글쓰기] (초기에는 숨겨둠) --- */
        #writing-page { z-index: 5; opacity: 0; visibility: hidden; transform: translateY(20px); pointer-events: none; }
        
        #emotion-paper {
            position: relative; width: 320px; height: 450px;
            background: var(--paper); box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            border-radius: 4px; overflow: visible;
        }

        #text-input {
            width: 100%; height: 100%; border: none; padding: 30px;
            font-size: 18px; line-height: 1.8; resize: none; box-sizing: border-box;
            outline: none; background: repeating-linear-gradient(white, white 35px, #f5f5f5 36px);
            position: absolute; top:0; left:0; z-index: 10; color: var(--text-main);
        }

        #erase-layer { position: absolute; top: 0; left: 0; z-index: 50; display: none; }

        /* --- [3단계: 옵션 모달] --- */
        #options-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .option-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn {
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            background: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; color: #555;
        }
        .option-btn:active { background: #fff5f5; border-color: var(--accent); }

        /* 파괴 애니메이션 */
        @keyframes ripLeft { to { transform: translateX(-150%) rotate(-20deg); opacity: 0; } }
        @keyframes ripRight { to { transform: translateX(150%) rotate(20deg); opacity: 0; } }
        .tear-piece { position: absolute; top: 0; width: 50%; height: 100%; background: white; z-index: 60; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="start-page" class="page">
        <h1 style="color: #5d5d5d; font-size: 1.8rem; margin-bottom: 30px;">감정쓰레기통</h1>
        <div id="bin-icon" onclick="goToWritingPage()">🗑️</div>
        <div class="description-box">
            <p>버리고 싶은 기억을 던지세요.<br>당신의 마음이 가벼워질 때까지.</p>
        </div>
    </div>

    <div id="writing-page" class="page">
        <div id="emotion-paper">
            <textarea id="text-input" placeholder="없애고 싶은 생각이나 감정을 여기에 털어 놓으세요. 내용은 저장되지 않습니다."></textarea>
            <canvas id="erase-layer"></canvas>
        </div>
        <div id="btn-area" style="margin-top: 30px;">
            <button style="padding: 15px 40px; border: none; border-radius: 30px; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;" onclick="completeWriting()">✍️ 작성 완료</button>
        </div>
    </div>

    <div id="options-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#444;">이 감정을 어떻게 처리할까요?</h3>
            <div class="option-list">
                <button class="option-btn" onclick="startAction('tear')">✂️ 1. 시원하게 찢기</button>
                <button class="option-btn" onclick="startAction('erase')">🧽 2. 깨끗이 지우기</button>
                <button class="option-btn" onclick="startAction('burn')">🔥 3. 불태워 버리기</button>
                <button class="option-btn" onclick="startAction('trash')">🗑️ 4. 쓰레기통에 던지기</button>
            </div>
        </div>
    </div>

    <script>
        // [수정됨] 화면 전환을 CSS가 아닌 자바스크립트로 강제 실행
        function goToWritingPage() {
            const startPage = document.getElementById('start-page');
            const writingPage = document.getElementById('writing-page');

            // 1페이지 서서히 숨기기
            startPage.style.opacity = '0';
            startPage.style.visibility = 'hidden';
            startPage.style.pointerEvents = 'none';

            // 2페이지 서서히 나타나기
            writingPage.style.opacity = '1';
            writingPage.style.visibility = 'visible';
            writingPage.style.pointerEvents = 'auto';
            writingPage.style.transform = 'translateY(0)';
            writingPage.style.zIndex = '20';
        }

        const input = document.getElementById('text-input');
        const canvas = document.getElementById('erase-layer');
        const ctx = canvas.getContext('2d');
        const paper = document.getElementById('emotion-paper');
        const modal = document.getElementById('options-modal');
        let selectedAction = null;

        function completeWriting() {
            if(input.value.trim() === "") return alert("내용을 적어주세요.");
            
            canvas.width = paper.offsetWidth;
            canvas.height = paper.offsetHeight;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333";
            ctx.font = "18px sans-serif";
            const lines = input.value.split('\n');
            lines.forEach((line, i) => ctx.fillText(line, 30, 60 + (i * 35)));
            
            input.style.visibility = 'hidden';
            document.getElementById('btn-area').style.display = 'none';
            modal.style.display = 'flex';
        }

        function startAction(type) {
            selectedAction = type;
            modal.style.display = 'none';

            if(type === 'erase') {
                canvas.style.display = 'block';
                alert("손가락으로 문질러서 지워보세요.");
            } else if(type === 'tear') {
                alert("옆으로 확 밀어서 찢어보세요.");
            } else if(type === 'burn') {
                paper.style.transition = "1.5s";
                paper.style.filter = "brightness(0) blur(10px)";
                paper.style.opacity = "0";
                finalize("태워 버렸습니다.");
            } else if(type === 'trash') {
                paper.style.transition = "1s";
                paper.style.transform = "scale(0.1) rotate(720deg) translateY(1000px)";
                paper.style.opacity = "0";
                finalize("던져 버렸습니다.");
            }
        }

        let isDrawing = false;
        let startX = 0;

        function handleStart(e) {
            if(!selectedAction) return;
            isDrawing = true;
            startX = (e.touches ? e.touches[0].clientX : e.clientX);
        }

        function handleMove(e) {
            if(!isDrawing || selectedAction !== 'erase') return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        function handleEnd(e) {
            if(!isDrawing) return;
            isDrawing = false;
            if(selectedAction === 'tear') {
                const endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
                if(Math.abs(startX - endX) > 80) executeTear();
            }
        }

        function executeTear() {
            paper.style.boxShadow = "none";
            paper.style.background = "transparent";
            const left = document.createElement('div');
            left.className = 'tear-piece';
            left.style.left = '0';
            left.style.clipPath = 'polygon(0 0, 100% 0, 80% 100%, 0 100%)';
            left.style.animation = 'ripLeft 1s forwards';
            const right = document.createElement('div');
            right.className = 'tear-piece';
            right.style.left = '50%';
            right.style.clipPath = 'polygon(20% 0, 100% 0, 100% 100%, 0 100%)';
            right.style.animation = 'ripRight 1s forwards';
            paper.appendChild(left);
            paper.appendChild(right);
            finalize("찢어 버렸습니다.");
        }

        function finalize(msg) {
            setTimeout(() => {
                alert(msg + "\n마음이 가벼워지셨길 바랍니다.");
                location.reload();
            }, 1500);
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('touchstart', handleStart, {passive:false});
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

    </script>
</body>
</html>
