<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지금 어떤 생각이 당신을 괴롭히고 있나요?</title>
    <style>
        /* UI 및 안내 문구용 레트로 폰트 */
        @font-face {
            font-family: 'RoundedFixedsys';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        /* 메모지 사용자 입력용 손글씨 폰트 */
        @font-face {
            font-family: 'GangwonEducationSaeum';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEduSaeeum_OTFMediumA.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        :root { --bg: #fdf1e8; --text-main: #5d5d5d; --accent: #ff5252; }
        body { 
            background-color: var(--bg); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'RoundedFixedsys', 'Malgun Gothic', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        h1 { 
            font-family: 'RoundedFixedsys', sans-serif; 
            margin-bottom: 10px; font-size: 1.8rem; color: #444; 
            text-align: center; padding: 0 20px; word-break: keep-all; line-height: 1.4;
        }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s, visibility 0.5s; 
        }

        #start-page { z-index: 10; opacity: 1; visibility: visible; }
        
        #trashcan-img {
            width: 120px; height: 120px; object-fit: cover; border-radius: 12px;
            cursor: pointer; margin-bottom: 25px; transition: transform 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #trashcan-img:hover { transform: scale(1.05) translateY(-5px); }
        
        #trashcan-emoji {
            font-size: 6rem; cursor: pointer; margin-bottom: 25px; transition: transform 0.2s;
        }
        #trashcan-emoji:hover { transform: scale(1.05) translateY(-5px); }

        .description-box { 
            width: 85%; max-width: 400px; text-align: center; color: var(--text-main); 
            line-height: 1.6; font-size: 1.05rem; font-family: 'RoundedFixedsys', sans-serif; 
            word-break: keep-all; margin-top: 10px;
        }

        #game-page { z-index: 5; opacity: 0; visibility: hidden; }
        
        #canvas-container {
            position: relative; width: 340px; height: 500px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 8px;
            background-color: white; overflow: hidden;
            background-image: repeating-linear-gradient(transparent, transparent 39px, #e0e0e0 39px, #e0e0e0 40px);
        }
        
        #instruction-toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px;
            border-radius: 20px; font-family: 'RoundedFixedsys', sans-serif; font-size: 15px;
            z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.3s ease-in-out;
            white-space: nowrap;
        }

        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; background: transparent; }
        
        #text-input {
            position: absolute; width: 100%; height: 100%; border: none; 
            padding: 0 25px; 
            font-family: 'GangwonEducationSaeum', sans-serif; font-size: 34px; line-height: 40px; 
            word-break: break-all; resize: none; box-sizing: border-box; outline: none; 
            background: transparent; color: var(--text-main); z-index: 1;
        }
        
        #text-input::placeholder { 
            color: #aaa; font-family: 'RoundedFixedsys', sans-serif; font-size: 16px; line-height: 40px;
        }

        .submit-btn {
            margin-top: 30px; padding: 15px 40px; border: none; border-radius: 30px; 
            background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; font-family: 'RoundedFixedsys', sans-serif;
            cursor: pointer; box-shadow: 0 6px 15px rgba(255, 82, 82, 0.3); transition: 0.2s; z-index: 10;
        }

        #options-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); font-family: 'RoundedFixedsys', sans-serif;
        }
        .modal-content h3 { font-family: 'RoundedFixedsys', sans-serif; color: #444; margin-top:0;}
        .option-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn {
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            background: #fff; font-weight: bold; cursor: pointer; color: #555; font-size: 1rem; font-family: 'RoundedFixedsys', sans-serif; transition: 0.2s;
        }
        .option-btn:active { background: #fdf1e8; border-color: var(--accent); }

        #result-page { z-index: 20; opacity: 0; visibility: hidden; background-color: var(--bg); padding: 20px; box-sizing: border-box;}
        
        .result-title { 
            font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; 
            font-family: 'RoundedFixedsys', sans-serif; text-align: center; white-space: nowrap;
        }
        
        .result-msg { 
            font-size: 1.1rem; color: #555; margin-bottom: 35px; 
            font-family: 'RoundedFixedsys', sans-serif; text-align: center; 
            line-height: 1.5; word-break: keep-all; max-width: 340px;
        }
        .result-msg p { margin: 0 0 14px 0; }
        .result-msg p:last-child { margin-bottom: 0; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
        .result-btn { 
            padding: 15px 0; border: none; border-radius: 30px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; transition: 0.2s; font-family: 'RoundedFixedsys', sans-serif; 
        }
        .btn-retry { background: #fff; color: var(--accent); border: 2px solid var(--accent); }
        .btn-home { background: var(--accent); color: white; box-shadow: 0 6px 15px rgba(255, 82, 82, 0.3); }

    </style>
</head>
<body>

    <div id="start-page" class="page">
        <h1>지금 어떤 생각이 당신을 괴롭히고 있나요?</h1>
        <img id="trashcan-img" src="Gemini_Generated_Image_2h98iu2h98iu2h98.jpg" alt="쓰레기통" onclick="goToGamePage()" onerror="this.outerHTML='<div id=\'trashcan-emoji\' onclick=\'goToGamePage()\'>🗑️</div>'">
        <div class="description-box">
            <p>떠오르는 스트레스를 종이로 만들어<br>부수고 버리는 행동을 통해,<br>생각과 나 사이에 건강한 거리를<br>만들어 보세요.</p>
        </div>
    </div>

    <div id="game-page" class="page">
        <div id="canvas-container">
            <div id="instruction-toast">안내 멘트</div>
            <textarea id="text-input" placeholder="없애고 싶은 생각이나 감정을 이곳에 털어 놓으세요. 작성한 내용은 저장되지 않습니다."></textarea>
            <canvas id="main-canvas"></canvas>
            <canvas id="hidden-texture" style="display:none;"></canvas>
            <canvas id="crease-hidden" style="display:none;"></canvas>
        </div>
        <button id="btn-submit" class="submit-btn" onclick="completeWriting()">✍️ 작성 완료</button>
    </div>

    <div id="options-modal">
        <div class="modal-content">
            <h3>이 기억을 어떻게 처리할까요?</h3>
            <div class="option-list">
                <button class="option-btn" onclick="selectAction('tear')">✂️산산조각 내기</button>
                <button class="option-btn" onclick="selectAction('erase')">✏️지우개로 지우기</button>
                <button class="option-btn" onclick="selectAction('burn_ready')">🔥불 태우기</button>
                <button class="option-btn" onclick="selectAction('basketball_prep')">🗑️구겨서 버리기</button>
                <button class="option-btn" onclick="selectAction('shred_ready')">🗳️파쇄기로 갈기</button>
            </div>
        </div>
    </div>

    <div id="result-page" class="page">
        <div id="result-status" class="result-title">완료되었습니다</div>
        <div class="result-msg">
            <p>생각은 내가 아닙니다.<br>내가 어떻게 '다루느냐'에 따라<br>달라지는 대상일 뿐이죠.</p>
            <p>직접 찢고 버리는 이 단순한 행동이,<br>당신과 스트레스 사이에<br>안전한 거리를 만들어 줄 거예요.</p>
            <p>비워진 그 자리에<br>내일을 지탱할 평온함이<br>가득 차길 응원합니다.</p>
        </div>
        <div class="btn-group">
            <button class="result-btn btn-retry" onclick="retryWithOtherMethod()">🔄 다른 방법으로 지우기</button>
            <button class="result-btn btn-home" onclick="resetToStart()">🏠 처음으로</button>
        </div>
    </div>

    <script>
        const PolygonClipper = (() => {
            const getIntersection = (A, B, C, D) => {
                const a1 = B.y - A.y; const b1 = A.x - B.x; const c1 = a1 * A.x + b1 * A.y;
                const a2 = D.y - C.y; const b2 = C.x - D.x; const c2 = a2 * C.x + b2 * C.y;
                const det = a1 * b2 - a2 * b1;
                if (det === 0) return null;
                const x = (b2 * c1 - b1 * c2) / det; const y = (a1 * c2 - a2 * c1) / det;
                const minX = Math.min(C.x, D.x) - 0.1; const maxX = Math.max(C.x, D.x) + 0.1;
                const minY = Math.min(C.y, D.y) - 0.1; const maxY = Math.max(C.y, D.y) + 0.1;
                if (x >= minX && x <= maxX && y >= minY && y <= maxY) return {x, y};
                return null;
            };
            const splitPolygon = (vertices, A, B) => {
                const p1 = [], p2 = [];
                for (let i = 0; i < vertices.length; i++) {
                    const cur = vertices[i]; const next = vertices[(i + 1) % vertices.length];
                    const side = (B.x - A.x) * (cur.y - A.y) - (B.y - A.y) * (cur.x - A.x);
                    if (side >= 0) p1.push(cur); if (side <= 0) p2.push(cur); 
                    const intersect = getIntersection(A, B, cur, next);
                    if (intersect) { const distCur = Math.hypot(intersect.x - cur.x, intersect.y - cur.y); const distNext = Math.hypot(intersect.x - next.x, intersect.y - next.y); if (distCur > 0.1 && distNext > 0.1) { p1.push(intersect); p2.push(intersect); } }
                }
                if (p1.length >= 3 && p2.length >= 3) return [p1, p2];
                return null;
            };
            return { splitPolygon };
        })();

        class PaperPiece {
            constructor(vertices, dx = 0, dy = 0, vx = 0, vy = 0) {
                this.vertices = vertices; this.dx = dx; this.dy = dy; this.vx = vx; this.vy = vy; this.alpha = 1; 
                this.delay = 100;
            }
            update() {
                if(this.vx === 0 && this.vy === 0) return;
                
                this.delay--; 
                if (this.delay <= 0) { 
                    this.vy += 0.05; 
                    this.alpha -= 0.01; 
                } else { 
                    this.vx *= 0.9; 
                    this.vy *= 0.9; 
                }
                
                const currentX = 170 + this.dx; const currentY = 250 + this.dy;
                if (currentX < 20) { this.vx = Math.abs(this.vx) * 0.5; this.dx += 1; }
                if (currentX > 320) { this.vx = -Math.abs(this.vx) * 0.5; this.dx -= 1; }
                if (currentY < 20) { this.vy = Math.abs(this.vy) * 0.5; this.dy += 1; }
                
                this.dx += this.vx; this.dy += this.vy;
            }
            draw(ctx, texture) {
                if (this.alpha <= 0) return; ctx.save(); ctx.globalAlpha = this.alpha; ctx.translate(this.dx, this.dy); ctx.beginPath();
                this.vertices.forEach((v, i) => { if (i === 0) ctx.moveTo(v.x, v.y); else ctx.lineTo(v.x, v.y); });
                ctx.closePath(); ctx.clip(); ctx.drawImage(texture, 0, 0); ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();
            }
        }

        const mainCanvas = document.getElementById('main-canvas'); const mainCtx = mainCanvas.getContext('2d');
        const textureCanvas = document.getElementById('hidden-texture'); const textureCtx = textureCanvas.getContext('2d');
        const creaseCanvas = document.getElementById('crease-hidden'); const creaseCtx = creaseCanvas.getContext('2d');
        const input = document.getElementById('text-input'); const modal = document.getElementById('options-modal');
        const cw = 340, ch = 500;
        
        let selectedAction = null; let isDrawing = false; let swipeStartX = 0, swipeStartY = 0; let swipeCurrY = 0;
        let paperPieces = []; let isGameFinished = false; 
        
        let totalPiecesCreated = 1; 

        let burnY = 0; let fireParticles = [];
        let matchX = cw / 2, matchY = ch / 2, lastMatchX = cw / 2, lastMatchY = ch / 2, matchAngle = Math.PI / 4, isLit = false, strikeDistance = 0, igniteX = 0, igniteY = 0, igniteAngle = 0, introTick = 0;
        let isPinching = false, pinchStartDist = 0, pinchRatio = 1; 
        let ballX = cw / 2, ballY = ch - 120, ballScale = 0.4, isThrown = false, throwVy = 0, throwVx = 0;
        let shredProgress = 0, handleAngle = 0, lastShredY = 0;

        mainCanvas.width = cw; mainCanvas.height = ch; textureCanvas.width = cw; textureCanvas.height = ch; creaseCanvas.width = cw; creaseCanvas.height = ch;

        const basketImage = new Image();
        basketImage.src = 'Gemini_Generated_Image_2h98iu2h98iu2h98.jpg';

        function showInstruction(text) {
            const toast = document.getElementById('instruction-toast');
            if (text) { toast.innerText = text; toast.style.opacity = '1'; } 
            else { toast.style.opacity = '0'; }
        }

        function finishGame(title, delay) {
            isGameFinished = true;
            showInstruction(""); 
            setTimeout(() => {
                document.getElementById('result-status').innerText = title;
                document.getElementById('game-page').style.opacity = '0';
                document.getElementById('game-page').style.visibility = 'hidden';
                document.getElementById('result-page').style.opacity = '1';
                document.getElementById('result-page').style.visibility = 'visible';
            }, delay);
        }

        function resetCanvasContainer() {
            const cont = document.getElementById('canvas-container');
            cont.style.transition = "none"; cont.style.transform = "none"; cont.style.opacity = "1";
            cont.style.background = "white"; cont.style.backgroundImage = "repeating-linear-gradient(transparent, transparent 39px, #e0e0e0 39px, #e0e0e0 40px)";
            cont.style.boxShadow = "0 15px 50px rgba(0,0,0,0.1)";
            mainCtx.globalCompositeOperation = 'source-over'; mainCtx.clearRect(0, 0, cw, ch);
            showInstruction("");
            
            selectedAction = null; isGameFinished = false; totalPiecesCreated = 1;
        }

        function renderTextToTexture() {
            const scrollY = input.scrollTop;
            textureCtx.clearRect(0, 0, cw, ch); textureCtx.fillStyle = "#5d5d5d"; 
            textureCtx.font = "34px 'GangwonEducationSaeum', sans-serif"; 
            textureCtx.textBaseline = "alphabetic";
            let currentY = 36 - scrollY; 
            input.value.split('\n').forEach(para => {
                currentY = wrapText(textureCtx, para, 25, currentY, cw - 50, 40); currentY += 40; 
            });
        }

        function retryWithOtherMethod() {
            document.getElementById('result-page').style.opacity = '0';
            document.getElementById('result-page').style.visibility = 'hidden';
            document.getElementById('game-page').style.opacity = '1';
            document.getElementById('game-page').style.visibility = 'visible';
            
            resetCanvasContainer();
            renderTextToTexture(); 
            modal.style.display = 'flex';
        }

        function resetToStart() {
            document.getElementById('result-page').style.opacity = '0';
            document.getElementById('result-page').style.visibility = 'hidden';
            document.getElementById('start-page').style.opacity = '1';
            document.getElementById('start-page').style.visibility = 'visible';
            
            resetCanvasContainer();
            input.value = ''; input.style.visibility = 'visible';
            document.getElementById('btn-submit').style.visibility = 'visible';
        }

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            let words = text.split(''); let line = '';
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n];
                if (context.measureText(testLine).width > maxWidth && n > 0) { context.fillText(line, x, y); line = words[n]; y += lineHeight; } else { line = testLine; }
            }
            context.fillText(line, x, y); return y; 
        }

        function goToGamePage() {
            document.getElementById('start-page').style.opacity = '0'; document.getElementById('start-page').style.visibility = 'hidden'; 
            document.getElementById('game-page').style.opacity = '1'; document.getElementById('game-page').style.visibility = 'visible';
            input.focus(); input.blur();
        }

        function completeWriting() {
            if(input.value.trim() === "") return alert("내용을 입력해주세요.");
            renderTextToTexture();
            input.style.visibility = 'hidden'; document.getElementById('btn-submit').style.visibility = 'hidden'; modal.style.display = 'flex';
        }

        function bakePaperIntoCanvas() {
            const cont = document.getElementById('canvas-container');
            cont.style.background = "transparent"; cont.style.backgroundImage = "none"; cont.style.boxShadow = "none";
            const scrollY = input.scrollTop;
            const tempCanvas = document.createElement('canvas'); tempCanvas.width = cw; tempCanvas.height = ch; const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = "white"; tempCtx.fillRect(0,0,cw,ch);
            tempCtx.fillStyle = "#e0e0e0"; for(let y = 39 - (scrollY % 40); y < ch + 40; y += 40) tempCtx.fillRect(0, y, cw, 1);
            tempCtx.drawImage(textureCanvas, 0, 0);
            textureCtx.clearRect(0, 0, cw, ch); textureCtx.drawImage(tempCanvas, 0, 0);
        }

        function precomputeCreaseTexture() {
            creaseCtx.clearRect(0, 0, cw, ch); creaseCtx.strokeStyle = "rgba(0, 0, 0, 0.2)"; creaseCtx.lineWidth = 1;
            for(let i=0; i<80; i++) {
                let sX = Math.random() * cw; let sY = Math.random() * ch; creaseCtx.beginPath(); creaseCtx.moveTo(sX, sY);
                let steps = Math.random() * 8 + 4; for(let j=0; j<steps; j++) { creaseCtx.lineTo(sX + (Math.random()-0.5)*80, sY + (Math.random()-0.5)*80); } creaseCtx.stroke();
            }
        }

        function selectAction(type) {
            selectedAction = type; modal.style.display = 'none'; isGameFinished = false;
            
            if(type === 'tear') {
                bakePaperIntoCanvas(); 
                paperPieces = [new PaperPiece([ {x:0,y:0},{x:cw,y:0},{x:cw,y:ch},{x:0,y:ch} ], 0, 0, 0, 0)]; 
                totalPiecesCreated = 1;
                showInstruction("화면을 마구 그어 종이를 찢으세요! ✂️"); gameLoop(); 
            } else if(type === 'erase') {
                resetCanvasContainer(); mainCtx.drawImage(textureCanvas, 0, 0);
                selectedAction = 'erase'; 
                showInstruction("글자를 손가락으로 문질러 지우세요✏️"); gameLoop(); 
            } else if(type === 'burn_ready') {
                bakePaperIntoCanvas(); matchX = cw / 2; matchY = ch / 2; matchAngle = Math.PI / 4; isLit = false; strikeDistance = 0; fireParticles = []; 
                selectedAction = 'burn_ready'; 
                showInstruction("화면을 짧게 그어 불을 붙이세요! 🧨"); gameLoop();
            } else if(type === 'basketball_prep') {
                bakePaperIntoCanvas(); pinchRatio = 1; isPinching = false; precomputeCreaseTexture(); triggerVibration(); 
                selectedAction = 'basketball_prep';
                showInstruction("두 손가락을 모아 종이를 구기세요! ✊"); gameLoop();
            } else if(type === 'shred_ready') {
                bakePaperIntoCanvas(); shredProgress = 0; handleAngle = 0; triggerVibration(); 
                selectedAction = 'shred_ready';
                showInstruction("오른쪽 손잡이를 위아래로 돌리세요🗳️"); gameLoop();
            }
        }

        function triggerVibration(ms = 20) { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(ms); }
        function getMousePos(e) { const rect = mainCanvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; }

        function handleStart(e) { 
            if(!selectedAction) return; if(e.cancelable) e.preventDefault(); 
            isDrawing = true; const pos = getMousePos(e); swipeStartX = pos.x; swipeStartY = pos.y; swipeCurrY = pos.y;
            if (selectedAction === 'burn_ready') { selectedAction = 'burn_striking'; matchX = pos.x; matchY = pos.y; lastMatchX = pos.x; lastMatchY = pos.y; strikeDistance = 0; } 
            else if (selectedAction === 'basketball_prep' && e.touches && e.touches.length === 2) { isPinching = true; pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
            else if (selectedAction === 'basketball_throw') { swipeStartY = pos.y; }
            else if (selectedAction === 'shred_ready') { selectedAction = 'shred_striking'; lastShredY = pos.y; strikeDistance = 0; }
        }

        function handleMove(e) {
            if(!selectedAction || isGameFinished) return; if(e.cancelable) e.preventDefault(); const currPos = getMousePos(e);
            
            if(isDrawing && selectedAction === 'erase') {
                mainCtx.globalCompositeOperation = 'destination-out'; mainCtx.beginPath(); mainCtx.arc(currPos.x, currPos.y, 25, 0, Math.PI * 2); mainCtx.fill(); triggerVibration(5);
            } 
            else if(isDrawing && selectedAction === 'tear') {
                const dist = Math.hypot(currPos.x - swipeStartX, currPos.y - swipeStartY);
                if(dist > 30) { executeCut(swipeStartX, swipeStartY, currPos.x, currPos.y); swipeStartX = currPos.x; swipeStartY = currPos.y; }
            } 
            else if(isDrawing && selectedAction === 'burn_striking') {
                let dx = currPos.x - lastMatchX; let dy = currPos.y - lastMatchY; let moveDist = Math.hypot(dx, dy);
                matchX = currPos.x; matchY = currPos.y;
                if (moveDist > 2) matchAngle = (dx > 0 ? 1 : -1) * Math.PI / 6; strikeDistance += moveDist; lastMatchX = currPos.x; lastMatchY = currPos.y;
                if (Math.floor(strikeDistance / 20) > Math.floor((strikeDistance - moveDist) / 20)) { triggerVibration(5); fireParticles.push({ x: matchX, y: matchY, vx: (Math.random() - 0.5), vy: -Math.random() - 1, life: 1, size: Math.random() * 3 + 2, color: '#57606f' }); }
                if (strikeDistance > 60) { 
                    isLit = true; triggerVibration(50); showInstruction(""); 
                    for(let i=0; i<15; i++) fireParticles.push({ x: matchX, y: matchY, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 1, size: Math.random() * 6 + 3, color: '#fbc531' });
                    igniteX = matchX; igniteY = matchY; igniteAngle = matchAngle; selectedAction = 'burn_drop'; introTick = 0; isDrawing = false;
                }
            } else if (selectedAction === 'basketball_prep' && isPinching && e.touches && e.touches.length === 2) {
                let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if(pinchStartDist > 0) { pinchRatio = currentDist / pinchStartDist; if(pinchRatio > 1.0) pinchRatio = 1.0; if(pinchRatio < 0.4) pinchRatio = 0.4; }
            } else if (selectedAction === 'basketball_throw' && !isThrown) {
                swipeCurrY = currPos.y; ballX = currPos.x;
            } else if (isDrawing && selectedAction === 'shred_striking') {
                let dy = currPos.y - lastShredY;
                if(Math.abs(dy) > 3) { handleAngle += dy * 0.05; shredProgress += Math.abs(dy) * 0.5; lastShredY = currPos.y; triggerVibration(10); if (shredProgress > 10) showInstruction(""); }
            }
        }

        function handleEnd(e) { 
            isDrawing = false; 
            if(selectedAction === 'erase' && !isGameFinished) checkEraseComplete();
            if(selectedAction === 'burn_striking') { selectedAction = 'burn_ready'; strikeDistance = 0; }
            if(selectedAction === 'shred_striking') { selectedAction = 'shred_ready'; }
            if(isPinching) { isPinching = false; pinchStartDist = 0; }
            
            // 🔥 농구공 던지기: 드래그가 끝날 때 위로 충분히 스와이프 했는지 검사 🔥
            if(selectedAction === 'basketball_throw' && !isThrown) {
                let dy = swipeStartY - swipeCurrY;
                if (dy > 40) { // 감도 40: 너무 살짝 스쳐서 던져지는 것 방지
                    isThrown = true; throwVy = Math.max(-25, -15 - (dy * 0.1)); throwVx = (ballX - cw/2) * 0.08; 
                    triggerVibration(); showInstruction(""); 
                } else { 
                    ballX = cw/2; // 스와이프가 짧으면 다시 제자리로 돌아옴 (던지기 취소)
                }
            }
        }

        function executeCut(startX, startY, endX, endY) {
            let slicedSucceeded = false; const newPieces = [];
            for (let i = paperPieces.length - 1; i >= 0; i--) {
                const p = paperPieces[i]; const localA = { x: startX - p.dx, y: startY - p.dy }; const localB = { x: endX - p.dx, y: endY - p.dy };
                const result = PolygonClipper.splitPolygon(p.vertices, localA, localB);
                if (result) {
                    slicedSucceeded = true; paperPieces.splice(i, 1);
                    const sliceDx = endX - startX; const sliceDy = endY - startY; const len = Math.hypot(sliceDx, sliceDy);
                    const pushX = -(sliceDy / len) * 0.4; const pushY = (sliceDx / len) * 0.4;
                    newPieces.push(new PaperPiece(result[0], p.dx, p.dy, p.vx + pushX, p.vy + pushY)); 
                    newPieces.push(new PaperPiece(result[1], p.dx, p.dy, p.vx - pushX, p.vy - pushY));
                }
            }
            if (slicedSucceeded) { 
                paperPieces.push(...newPieces); 
                totalPiecesCreated += newPieces.length / 2;
                triggerVibration(10); showInstruction(""); 
            }
            if(totalPiecesCreated >= 500 && !isGameFinished) { finishGame("기억은 먼지가 되었습니다", 1500); }
        }

        function checkEraseComplete() {
            const imageData = mainCtx.getImageData(0, 0, cw, ch).data; let textPixels = 0;
            for (let i = 3; i < imageData.length; i += 4 * 25) { if (imageData[i] > 0) textPixels++; }
            if (textPixels < 15 && !isGameFinished) { finishGame("깨끗하게 지워졌습니다", 100); }
        }

        function drawShredderGraphic(ctx, angle) {
            const sy = 180;
            ctx.fillStyle = "#ff9fb2"; ctx.beginPath(); ctx.roundRect(20, sy, cw-40, 60, 10); ctx.fill();
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.fillRect(30, sy+40, cw-60, 230);
            ctx.fillStyle = "#4a1c26"; ctx.beginPath(); ctx.roundRect(40, sy+15, cw-80, 12, 6); ctx.fill();
            ctx.save(); ctx.translate(cw-25, sy+30); ctx.rotate(angle); ctx.fillStyle = "#e87b91"; ctx.fillRect(0,-4,40,8); ctx.fillStyle = "#ff5d8f"; ctx.beginPath(); ctx.ellipse(40,0,8,12,0,0,Math.PI*2); ctx.fill(); ctx.restore();
        }

        function drawSpikyFire(ctx, baseY, heightMult, color, timeOffset) {
            let time = Date.now() * 0.015; ctx.beginPath(); ctx.moveTo(0, baseY);
            for(let x=0; x<=cw; x+=24) { let noise = Math.sin(x * 0.15 + time + timeOffset) * Math.cos(x * 0.05 - time) * 0.5 + 0.5; let spikeHeight = noise * heightMult + Math.random() * 10; ctx.lineTo(x + 12, baseY - spikeHeight); ctx.lineTo(x + 24, baseY + Math.random() * 5); }
            ctx.lineTo(cw, ch+50); ctx.lineTo(0, ch+50); ctx.fillStyle = color; ctx.fill();
        }

        function drawMatch(ctx, x, y, angle, isLit) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.fillStyle = "#d1ccc0"; ctx.fillRect(-3, 0, 6, 80); ctx.fillStyle = isLit ? "#2c3e50" : "#eb4d4b"; ctx.beginPath(); ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
            if(isLit) { let time = Date.now() * 0.02, flicker = Math.random() * 5; ctx.fillStyle = "rgba(255, 140, 0, 0.9)"; ctx.beginPath(); ctx.moveTo(0, -35 - flicker); ctx.quadraticCurveTo(15, -10, 5, 5); ctx.quadraticCurveTo(0, 10, -5, 5); ctx.quadraticCurveTo(-15, -10, 0, -35 - flicker); ctx.fill(); ctx.fillStyle = "rgba(255, 200, 50, 0.95)"; ctx.beginPath(); ctx.moveTo(0, -20 - flicker*0.5); ctx.quadraticCurveTo(8, -5, 3, 3); ctx.quadraticCurveTo(0, 6, -3, 3); ctx.quadraticCurveTo(-8, -5, 0, -20 - flicker*0.5); ctx.fill(); }
            ctx.restore();
        }

        function drawCrumpledBall(ctx, x, y, scale) {
            ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale); ctx.beginPath();
            if (scale < 0.98) {
                let rX = (cw/2) * scale;
                let rY = (ch/2) * scale;
                let points = 40;
                for(let i=0; i<points; i++) {
                    let a = (i/points) * Math.PI * 2;
                    let noise = Math.sin(a * 5) * 10 * (1-scale) + Math.cos(a * 13) * 15 * (1-scale);
                    let currentRx = rX + noise - (cw/2 - 120) * (1-scale); 
                    let currentRy = rY + noise - (ch/2 - 120) * (1-scale);
                    let px = Math.cos(a) * Math.max(20, currentRx);
                    let py = Math.sin(a) * Math.max(20, currentRy);
                    if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
            } else { ctx.rect(-cw/2, -ch/2, cw, ch); }
            ctx.closePath(); ctx.clip(); 
            ctx.fillStyle = "white"; ctx.fillRect(-cw/2, -ch/2, cw, ch);
            ctx.fillStyle = "#e0e0e0"; for(let yy = -ch/2 + 39; yy < ch/2 + 40; yy += 40) ctx.fillRect(-cw/2, yy, cw, 1);
            ctx.drawImage(textureCanvas, -cw/2, -ch/2); 
            if(scale < 0.98) { 
                ctx.globalAlpha = Math.min((1-scale)*2.0, 1.0); 
                ctx.drawImage(creaseCanvas, -cw/2, -ch/2); 
                let innerShadow = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(50, cw/2 * scale));
                innerShadow.addColorStop(0, "rgba(0,0,0,0)");
                innerShadow.addColorStop(1, "rgba(0,0,0," + (1-scale)*0.6 + ")");
                ctx.fillStyle = innerShadow; ctx.fill();
            } 
            ctx.restore();
        }

        function gameLoop() {
            if(!selectedAction) return;
            requestAnimationFrame(gameLoop);

            if(selectedAction === 'tear') {
                mainCtx.clearRect(0, 0, cw, ch);
                for (let i = paperPieces.length - 1; i >= 0; i--) { const piece = paperPieces[i]; piece.update(); piece.draw(mainCtx, textureCanvas); if (piece.alpha <= 0 || piece.dy > 1200) paperPieces.splice(i, 1); }
            } 
            else if (selectedAction === 'burn_ready' || selectedAction === 'burn_striking') {
                mainCtx.clearRect(0, 0, cw, ch); mainCtx.globalCompositeOperation = 'source-over'; mainCtx.drawImage(textureCanvas, 0, 0); 
                for(let i=fireParticles.length-1; i>=0; i--) { let p = fireParticles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05; if(p.life <= 0) fireParticles.splice(i, 1); else { mainCtx.globalAlpha = p.life; mainCtx.fillStyle = p.color; mainCtx.beginPath(); mainCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); mainCtx.fill(); } }
                mainCtx.globalAlpha = 1; drawMatch(mainCtx, matchX, matchY, matchAngle, isLit);
            }
            else if (selectedAction === 'burn_drop') {
                mainCtx.clearRect(0, 0, cw, ch); mainCtx.globalCompositeOperation = 'source-over'; mainCtx.drawImage(textureCanvas, 0, 0); 
                introTick++; let p = introTick / 30; if (p > 1) p = 1; matchX = igniteX * (1-p) + (cw/2) * p; matchY = igniteY * (1-p) + (ch - 10) * p; matchAngle = igniteAngle * (1-p) + Math.PI * p;
                if(Math.random() > 0.4) fireParticles.push({ x: matchX, y: matchY, vx: (Math.random() - 0.5) * 3, vy: -Math.random() * 3 - 1, life: 1, size: Math.random() * 4 + 2, color: '#fbc531' });
                if (introTick >= 35) { triggerVibration(40); selectedAction = 'burn'; burnY = ch - 15; fireParticles = []; return; }
                for(let i=fireParticles.length-1; i>=0; i--) { let p = fireParticles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05; if(p.life <= 0) fireParticles.splice(i, 1); else { mainCtx.globalAlpha = p.life; mainCtx.fillStyle = p.color; mainCtx.beginPath(); mainCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); mainCtx.fill(); } }
                mainCtx.globalAlpha = 1; drawMatch(mainCtx, matchX, matchY, matchAngle, true);
            }
            else if (selectedAction === 'basketball_prep') {
                mainCtx.clearRect(0, 0, cw, ch); mainCtx.globalCompositeOperation = 'source-over'; drawCrumpledBall(mainCtx, cw/2, ch/2, pinchRatio);
                
                // 🔥 구기기가 끝나고 던지기 상태로 넘어갈 때 swipe 시작점을 초기화하여 자동 던지기 방지 🔥
                if (pinchRatio <= 0.4) { 
                    triggerVibration(50); 
                    selectedAction = 'basketball_throw'; 
                    ballX = cw/2; ballY = ch-120; ballScale = 0.4; isThrown = false; 
                    swipeStartY = 0; swipeCurrY = 0; // 핵심 버그 수정 부분
                    showInstruction("위로 휙! 스와이프해서 던지세요 👆"); 
                }
            }
            else if (selectedAction === 'basketball_throw') {
                mainCtx.clearRect(0, 0, cw, ch);
                if (basketImage.complete && basketImage.naturalHeight !== 0) {
                    mainCtx.drawImage(basketImage, cw/2-40, 110-40, 80, 80);
                } else {
                    mainCtx.font = "80px Arial"; mainCtx.textAlign = "center"; mainCtx.textBaseline = "middle"; mainCtx.fillText("🗑️", cw / 2, 110);
                }

                if (isThrown) {
                    ballY += throwVy; ballX += throwVx; 
                    ballScale -= 0.005; if (ballScale < 0.15) ballScale = 0.15; 
                    if (ballY < 200) ballX += (cw/2 - ballX) * 0.2;

                    if (ballY <= 130 && Math.abs(ballX - cw / 2) < 40 && !isGameFinished) { triggerVibration(40); finishGame("쓰레기통에 버려졌습니다", 500); }
                    else if (ballY < -20 || ballX < -20 || ballX > cw + 20) { isThrown = false; ballX = cw/2; ballY = ch-120; ballScale = 0.4; showInstruction("아까비! 다시 위로 휙 던져보세요 👆"); }
                }
                if (!isGameFinished) { drawCrumpledBall(mainCtx, ballX, ballY, ballScale); }
            }
            else if (selectedAction === 'shred_ready' || selectedAction === 'shred_striking') {
                mainCtx.clearRect(0, 0, cw, ch);
                const entY = 195; const pSc = 0.75; const pW = cw*pSc; const offX = 50; 
                if (shredProgress > 0) {
                    for(let x=0; x<pW; x+=5) { mainCtx.save(); mainCtx.beginPath(); mainCtx.rect(offX+x+Math.sin(x+Date.now()*0.005)*1.5, entY, 4, shredProgress); mainCtx.clip(); mainCtx.translate(offX, shredProgress); mainCtx.scale(pSc, pSc); mainCtx.drawImage(textureCanvas, 0, 0); mainCtx.restore(); }
                }
                drawShredderGraphic(mainCtx, handleAngle);
                if (entY - shredProgress > 0) { mainCtx.save(); mainCtx.beginPath(); mainCtx.rect(offX, 0, pW, entY); mainCtx.clip(); mainCtx.translate(offX, shredProgress); mainCtx.scale(pSc, pSc); mainCtx.drawImage(textureCanvas, 0, 0); mainCtx.restore(); }
                if (shredProgress >= 260 && !isGameFinished) { finishGame("파쇄가 완료되었습니다", 500); }
            }
            else if (selectedAction === 'burn') {
                mainCtx.clearRect(0, 0, cw, ch); mainCtx.globalCompositeOperation = 'source-over'; mainCtx.drawImage(textureCanvas, 0, 0); burnY -= 3.0; 
                drawSpikyFire(mainCtx, burnY - 10, 25, "rgba(20, 10, 5, 0.95)", 0);      
                drawSpikyFire(mainCtx, burnY - 5, 35, "rgba(220, 50, 50, 0.9)", 100);    
                drawSpikyFire(mainCtx, burnY + 2, 40, "rgba(255, 140, 0, 0.95)", 200);   
                drawSpikyFire(mainCtx, burnY + 8, 45, "rgba(255, 200, 50, 0.98)", 300);  
                mainCtx.globalCompositeOperation = 'destination-out'; 
                drawSpikyFire(mainCtx, burnY + 15, 30, "black", 150); 
                mainCtx.globalCompositeOperation = 'source-over'; 
                
                if (burnY > -50) { 
                    let pType = Math.random(); let pColor = pType > 0.5 ? '#e84118' : (pType > 0.2 ? '#fbc531' : '#2f3640'); 
                    fireParticles.push({ x: Math.random() * cw, y: burnY - 40 + Math.random() * 15, vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 4 - 3, life: 1, size: Math.random() * 10 + 8, color: pColor }); 
                } 
                for(let i=fireParticles.length-1; i>=0; i--) { 
                    let p = fireParticles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03; 
                    if(p.life <= 0) fireParticles.splice(i, 1); 
                    else { 
                        mainCtx.save(); mainCtx.globalAlpha = p.life; mainCtx.translate(p.x, p.y); mainCtx.fillStyle = p.color; mainCtx.beginPath(); mainCtx.moveTo(0, -p.size * 1.5); mainCtx.quadraticCurveTo(p.size, -p.size * 0.5, p.size, p.size * 0.5); mainCtx.quadraticCurveTo(0, p.size * 1.2, -p.size, p.size * 0.5); mainCtx.quadraticCurveTo(-p.size, -p.size * 0.5, 0, -p.size * 1.5); mainCtx.fill(); mainCtx.restore(); 
                    } 
                } 
                mainCtx.globalAlpha = 1; 
                
                if (burnY < -80 && !isGameFinished) { finishGame("재가 되어 사라졌습니다", 0); }
            }
        }

        window.addEventListener('mousedown', handleStart); mainCanvas.addEventListener('touchstart', handleStart, {passive:false});
        window.addEventListener('mousemove', handleMove, {passive:false}); window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('mouseup', handleEnd); window.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
