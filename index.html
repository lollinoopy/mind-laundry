<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마음 세탁소 | Mind Laundry</title>
    <style>
        :root { --bg: #fdfbf7; --paper: #ffffff; --accent: #ff6b6b; }
        body { 
            background-color: var(--bg); margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden;
            touch-action: none; /* 브라우저 스크롤/확대 방지 */
        }
        h1 { color: #4a4a4a; font-size: 1.1rem; margin-bottom: 20px; pointer-events: none; }

        #laundry-bin {
            position: relative; width: 320px; height: 420px;
            background: var(--paper); box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 4px; overflow: hidden;
        }

        /* 입력창 */
        #text-input {
            width: 100%; height: 100%; border: none; padding: 25px;
            font-size: 18px; line-height: 1.6; resize: none; box-sizing: border-box;
            outline: none; background: repeating-linear-gradient(white, white 31px, #f5f5f5 32px);
            position: absolute; top:0; left:0; z-index: 1;
        }

        /* 지우개용 캔버스 */
        #erase-layer {
            position: absolute; top: 0; left: 0; z-index: 10;
            display: none; touch-action: none;
        }

        /* 찢기 애니메이션 조각 */
        .tear-piece {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: white; z-index: 20; pointer-events: none;
        }

        .controls { margin-top: 30px; display: flex; gap: 10px; z-index: 100; }
        button {
            padding: 12px 20px; border: none; border-radius: 25px;
            background: #fff; color: #555; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        button.active { background: var(--accent); color: white; }

        @keyframes ripLeft { to { transform: translateX(-150%) rotate(-25deg); opacity: 0; } }
        @keyframes ripRight { to { transform: translateX(150%) rotate(25deg); opacity: 0; } }
    </style>
</head>
<body>

    <h1>비우고 싶은 마음을 적어주세요</h1>

    <div id="laundry-bin">
        <textarea id="text-input" placeholder="여기에 당신의 기억을 채우세요..."></textarea>
        <canvas id="erase-layer"></canvas>
    </div>

    <div class="controls">
        <button id="btn-write" class="active" onclick="changeMode('write')">✍️ 쓰기</button>
        <button id="btn-erase" onclick="changeMode('erase')">🧽 지우개</button>
        <button id="btn-tear" onclick="changeMode('tear')">✂️ 찢기</button>
    </div>

    <script>
        const canvas = document.getElementById('erase-layer');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('text-input');
        const bin = document.getElementById('laundry-bin');
        let mode = 'write';
        let isDrawing = false;

        // 1. 크기 고정 및 초기화
        function initCanvas() {
            canvas.width = 320;
            canvas.height = 420;
        }
        window.onload = initCanvas;

        function changeMode(m) {
            mode = m;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
            
            if(m === 'erase') {
                canvas.style.display = 'block';
                input.style.visibility = 'hidden';
                // 캔버스에 현재 텍스트 복사
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#333";
                ctx.font = "18px sans-serif";
                
                const lines = input.value.split('\n');
                lines.forEach((line, i) => ctx.fillText(line, 25, 50 + (i * 30)));
            } else {
                canvas.style.display = 'none';
                input.style.visibility = 'visible';
            }
        }

        // 2. 지우개 기능 (Panning / Touch Move)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startAction(e) { 
            if(mode === 'write') return;
            if(e.type === 'touchstart') e.preventDefault();
            isDrawing = true; 
            if(mode === 'tear') startX = (e.touches ? e.touches[0].clientX : e.clientX);
        }

        function moveAction(e) {
            if(!isDrawing) return;
            if(e.cancelable) e.preventDefault(); // 중요: 터치 스크롤 방지

            if(mode === 'erase') {
                const pos = getPos(e);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 20, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function endAction(e) {
            if(!isDrawing) return;
            isDrawing = false;

            if(mode === 'tear') {
                let endX = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
                if(Math.abs(startX - endX) > 70) executeTear(); // 70px 이상 밀면 실행
            }
        }

        // 이벤트 리스너 통합 (마우스 + 터치)
        [canvas, bin].forEach(el => {
            el.addEventListener('mousedown', startAction);
            el.addEventListener('touchstart', startAction, {passive: false});
            window.addEventListener('mousemove', moveAction, {passive: false});
            window.addEventListener('touchmove', moveAction, {passive: false});
            window.addEventListener('mouseup', endAction);
            window.addEventListener('touchend', endAction);
        });

        // 3. 찢기 기능 (Swipe)
        let startX = 0;
        function executeTear() {
            bin.style.boxShadow = "none";
            const left = document.createElement('div');
            left.className = 'tear-piece';
            left.style.left = '0';
            left.style.clipPath = 'polygon(0 0, 100% 0, 80% 100%, 0 100%)';
            left.style.animation = 'ripLeft 1s forwards';
            
            const right = document.createElement('div');
            right.className = 'tear-piece';
            right.style.left = '50%';
            right.style.clipPath = 'polygon(20% 0, 100% 0, 100% 100%, 0 100%)';
            right.style.animation = 'ripRight 1s forwards';

            bin.appendChild(left);
            bin.appendChild(right);
            input.style.display = 'none';

            setTimeout(() => {
                alert("기억을 찢어 비워냈습니다.");
                location.reload();
            }, 1000);
        }
    </script>
</body>
</html>
