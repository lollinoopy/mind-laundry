<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>감정쓰레기통 - 진짜 찢기</title>
    <style>
        :root { --bg: #fdf1e8; --text-main: #5d5d5d; --accent: #ff5252; }
        body { 
            background-color: var(--bg); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        /* 공통 스타일 */
        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s, visibility 0.5s; 
        }

        /* --- [1페이지: 메인] --- */
        #start-page { z-index: 10; opacity: 1; visibility: visible; }
        .description-box { width: 80%; max-width: 400px; text-align: center; color: var(--text-main); line-height: 1.7; font-size: 0.95rem;}

        /* --- [2페이지: 게임 화면] --- */
        #game-page { z-index: 5; opacity: 0; visibility: hidden; }
        #canvas-container {
            position: relative; width: 320px; height: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 4px; background: #fff;
        }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        #text-input {
            position: absolute; width: 100%; height: 100%; border: none; padding: 25px;
            font-size: 18px; line-height: 1.8; resize: none; box-sizing: border-box;
            outline: none; background: repeating-linear-gradient(white, white 35px, #f5f5f5 36px);
            color: var(--text-main); z-index: 1; border-radius: 4px;
        }
        #text-input::placeholder { color: #bbb; }

        .submit-btn {
            margin-top: 30px; padding: 15px 40px; border: none; border-radius: 30px; 
            background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; box-shadow: 0 6px 15px rgba(255, 82, 82, 0.3); transition: 0.2s; z-index: 10;
        }
        .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(255, 82, 82, 0.3); }

        /* --- [옵션 모달] --- */
        #options-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .option-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn {
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            background: #fff; font-weight: bold; cursor: pointer; color: #555;
        }
        .option-btn:hover { background: #fff5f5; border-color: var(--accent); }

    </style>
</head>
<body>

    <div id="start-page" class="page">
        <h1 style="color: #5d5d5d; font-size: 1.8rem; margin-bottom: 20px;">감정쓰레기통</h1>
        <div style="font-size: 6rem; cursor: pointer; margin-bottom: 30px;" onclick="goToGamePage()">🗑️</div>
        <div class="description-box">
            <p>버리고 싶은 기억을 던지세요.<br>당신의 마음이 가벼워질 때까지.</p>
        </div>
    </div>

    <div id="game-page" class="page">
        <div id="canvas-container">
            <textarea id="text-input" placeholder="없애고 싶은 생각이나 감정을 이 곳에 털어 놓으세요. 작성한 내용은 저장되지 않습니다."></textarea>
            <canvas id="main-canvas"></canvas>
            <canvas id="hidden-texture" style="display:none;"></canvas>
        </div>
        <button id="btn-submit" class="submit-btn" onclick="completeWriting()">✍️ 작성 완료</button>
    </div>

    <div id="options-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#444;">이 기억을 어떻게 처리할까요?</h3>
            <div class="option-list">
                <button class="option-btn" onclick="selectAction('tear')">✂️ 1. 갈기갈기 찢기 (Pan)</button>
                <button class="option-btn" onclick="selectAction('trash')">🗑️ 2. 쓰레기통에 던지기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 고급 기하학 & 물리 엔진 로직 ---

        // 폴리곤 가위 (Line-Polygon Clipping)
        const PolygonClipper = (() => {
            const getIntersection = (p1, p2, p3, p4) => {
                const det = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
                if (det === 0) return null;
                const t = ((p3.x - p1.x) * (p4.y - p3.y) - (p3.y - p1.y) * (p4.x - p3.x)) / det;
                if (t >= 0 && t <= 1) return { x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y) };
                return null;
            };

            const splitPolygon = (polyVertices, pStart, pEnd) => {
                const p1 = [], p2 = [];
                let currentPos = 0;
                for (let i = 0; i < polyVertices.length; i++) {
                    const vertex = polyVertices[i];
                    const side = (pEnd.x - pStart.x) * (vertex.y - pStart.y) - (pEnd.y - pStart.y) * (vertex.x - pStart.x);
                    if (side > 0) {
                        if (currentPos === 2) { /* Intersected from Side 2 */ }
                        currentPos = 1; p1.push(vertex);
                    } else if (side < 0) {
                        if (currentPos === 1) { /* Intersected from Side 1 */ }
                        currentPos = 2; p2.push(vertex);
                    } else { /* On the line */ p1.push(vertex); p2.push(vertex); }
                    
                    const next = polyVertices[(i + 1) % polyVertices.length];
                    const intersect = getIntersection(pStart, pEnd, vertex, next);
                    if (intersect) { p1.push(intersect); p2.push(intersect); }
                }
                return (p1.length > 2 && p2.length > 2) ? [p1, p2] : null;
            };

            return { splitPolygon };
        })();

        // 찢어진 종이 조각 클래스
        class PaperPiece {
            constructor(vertices, textureCanvas, cx, cy) {
                this.vertices = vertices; // 조각의 폴리곤 좌표 [{x,y}, ...]
                this.textureCanvas = textureCanvas; // 원본 글씨 캔버스 레퍼런스
                
                // 조각의 물리적 특징 계산
                const box = this.getBounds();
                this.cx = cx; this.cy = cy; // 회전 중심 (원본 종이 기준)
                this.width = box.w; this.height = box.h;
                
                // 물리 속성 (랜덤 속도 부여)
                this.x = cx; this.y = cy; this.angle = 0;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 1) * 3; // 위로 살짝 튀어오르게
                this.torque = (Math.random() - 0.5) * 0.1; // 회전력
                this.alpha = 1; this.isDeleted = false;
            }

            getBounds() {
                const xs = this.vertices.map(v => v.x), ys = this.vertices.map(v => v.y);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const minY = Math.min(...ys), maxY = Math.max(...ys);
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            }

            update() {
                this.vy += 0.2; // 중력 적용
                this.x += this.vx; this.y += this.vy; this.angle += this.torque;
                this.alpha -= 0.005; // 서서히 투명해짐
                if (this.alpha <= 0) this.isDeleted = true;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                
                // 마스킹 영역 설정 (조각의 폴리곤 형태대로 그리기)
                ctx.beginPath();
                const path = new Path2D();
                this.vertices.forEach((v, i) => {
                    const localX = v.x - this.cx; const localY = v.y - this.cy;
                    if (i === 0) path.moveTo(localX, localY); else path.lineTo(localX, localY);
                });
                path.closePath();
                
                // 마스킹 영역 안에 원본 글씨 그리기
                ctx.clip(path);
                ctx.drawImage(this.textureCanvas, -this.cx, -this.cy);
                
                // 조각의 입체감을 위한 테두리 효과 (옵션)
                ctx.strokeStyle = "rgba(0,0,0,0.05)"; ctx.stroke(path);
                
                ctx.restore();
            }
        }

        // --- 메인 게임 로직 ---
        const mainCanvas = document.getElementById('main-canvas');
        const mainCtx = mainCanvas.getContext('2d');
        const textureCanvas = document.getElementById('hidden-texture');
        const textureCtx = textureCanvas.getContext('2d');
        const input = document.getElementById('text-input');
        const modal = document.getElementById('options-modal');
        const btnSubmit = document.getElementById('btn-submit');
        const cw = 320, ch = 450;
        let selectedAction = null;
        let isPasting = false;
        let lastPanPoint = null;
        let paperPieces = []; // 활성화된 종이 조각들
        let isGameFinished = false;

        // 화면 크기 고정
        mainCanvas.width = cw; mainCanvas.height = ch;
        textureCanvas.width = cw; textureCanvas.height = ch;

        function goToGamePage() {
            document.getElementById('start-page').style.opacity = '0';
            document.getElementById('start-page').style.visibility = 'hidden';
            document.getElementById('game-page').style.opacity = '1';
            document.getElementById('game-page').style.visibility = 'visible';
        }

        function completeWriting() {
            if(input.value.trim() === "") return alert("내용을 입력해주세요.");
            
            // 1. 쓴 글씨를 히든 캔버스에 이미지화 (이미지 캡처)
            textureCtx.fillStyle = "white"; textureCtx.fillRect(0, 0, cw, ch);
            textureCtx.fillStyle = "#333"; textureCtx.font = "18px sans-serif";
            input.value.split('\n').forEach((line, i) => textureCtx.fillText(line, 25, 50 + (i * 35)));
            
            // 2. 글쓰기 UI 숨김 및 메인 캔버스 초기화
            input.style.visibility = 'hidden'; btnSubmit.style.visibility = 'hidden';
            modal.style.display = 'flex';
        }

        function selectAction(type) {
            selectedAction = type; modal.style.display = 'none';
            if(type === 'tear') {
                // 초기 원본 종이 조각 생성
                paperPieces.push(new PaperPiece([ {x:0,y:0},{x:cw,y:0},{x:cw,y:ch},{x:0,y:ch} ], textureCanvas, cw/2, ch/2));
                alert("손가락으로 종이를 갈기갈기 찢어보세요!");
                gameLoop(); // 물리 애니메이션 시작
            } else if(type === 'trash') {
                // 쓰레기통 던지기는 단순 애니메이션으로 처리 (지난 버전 코드)
                mainCanvas.style.transition = "1s"; mainCanvas.style.opacity = "0";
                finalize("쓰레기통에 처박았습니다.");
            }
        }

        // --- 물리 및 기하학 찢기 처리 (Panning) ---
        function getMousePos(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(e) { 
            if(!selectedAction || selectedAction !== 'tear') return;
            if(e.cancelable) e.preventDefault(); isDrawing = true; lastPanPoint = getMousePos(e);
        }

        function handleMove(e) {
            if(!isDrawing || selectedAction !== 'tear' || isGameFinished) return;
            if(e.cancelable) e.preventDefault();
            const currentPoint = getMousePos(e);
            if(!lastPanPoint) return;

            // 1. 거리가 너무 가깝지 않을 때 찢기 실행
            const dist = Math.sqrt(Math.pow(currentPoint.x - lastPanPoint.x, 2) + Math.pow(currentPoint.y - lastPanPoint.y, 2));
            if(dist > 15) {
                const newPieces = [];
                for (let i = paperPieces.length - 1; i >= 0; i--) {
                    const piece = paperPieces[i];
                    
                    // 폴리곤 가위로 종이 조각 분할
                    const result = PolygonClipper.splitPolygon(piece.vertices, lastPanPoint, currentPoint);
                    if (result) {
                        // 기존 조각 삭제
                        paperPieces.splice(i, 1);
                        // 새로운 두 조각 생성 (원본cx, cy 유지)
                        newPieces.push(new PaperPiece(result[0], textureCanvas, piece.cx, piece.cy));
                        newPieces.push(new PaperPiece(result[1], textureCanvas, piece.cx, piece.cy));
                    }
                }
                paperPieces.push(...newPieces); // 새로운 조각들 추가
                lastPanPoint = currentPoint; // 마지막 패닝 좌표 업데이트
                
                // 게임 종료 조건 (조각이 너무 많거나 화면에 조각이 거의 없을 때)
                if(paperPieces.length > 50) checkGameFinished();
            }
        }

        function handleEnd(e) { isDrawing = false; lastPanPoint = null; }

        // --- 애니메이션 루프 (물리 엔진) ---
        function gameLoop() {
            if(isGameFinished) return;
            requestAnimationFrame(gameLoop);
            
            // 캔버스 초기화 (투명 배경)
            mainCtx.clearRect(0, 0, cw, ch);
            
            // 조각들 물리 시뮬레이션 및 그리기
            for (let i = paperPieces.length - 1; i >= 0; i--) {
                const piece = paperPieces[i];
                piece.update(); piece.draw(mainCtx);
                if (piece.isDeleted) paperPieces.splice(i, 1);
            }
            
            // 화면에 조각이 하나도 없으면 자동 리셋
            if(paperPieces.length === 0) location.reload();
        }

        function checkGameFinished() {
            isGameFinished = true;
            setTimeout(() => {
                alert("갈기갈기 찢어 버렸습니다.");
                location.reload();
            }, 1000);
        }

        function finalize(msg) { setTimeout(() => { alert(msg + "\n가벼워지셨길 바랍니다."); location.reload(); }, 1000); }

        mainCanvas.addEventListener('mousedown', handleStart);
        mainCanvas.addEventListener('touchstart', handleStart, {passive:false});
        window.addEventListener('mousemove', handleMove, {passive:false});
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

    </script>
</body>
</html>
