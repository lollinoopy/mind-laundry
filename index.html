<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>감정쓰레기통 - 산산조각 내기</title>
    <style>
        :root { --bg: #fdf1e8; --text-main: #5d5d5d; --accent: #ff5252; }
        body { 
            background-color: var(--bg); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s, visibility 0.5s; 
        }

        #start-page { z-index: 10; opacity: 1; visibility: visible; }
        .description-box { width: 80%; max-width: 400px; text-align: center; color: var(--text-main); line-height: 1.7; font-size: 0.95rem;}

        #game-page { z-index: 5; opacity: 0; visibility: hidden; }
        #canvas-container {
            position: relative; width: 320px; height: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); border-radius: 4px; background: transparent;
        }
        
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        
        #text-input {
            position: absolute; width: 100%; height: 100%; border: none; padding: 25px;
            font-size: 18px; line-height: 1.8; resize: none; box-sizing: border-box;
            outline: none; background: repeating-linear-gradient(white, white 35px, #f5f5f5 36px);
            color: var(--text-main); z-index: 1; border-radius: 4px;
        }
        #text-input::placeholder { color: #bbb; }

        .submit-btn {
            margin-top: 30px; padding: 15px 40px; border: none; border-radius: 30px; 
            background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; box-shadow: 0 6px 15px rgba(255, 82, 82, 0.3); transition: 0.2s; z-index: 10;
        }
        .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(255, 82, 82, 0.3); }

        #options-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center;
            width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .option-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn {
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            background: #fff; font-weight: bold; cursor: pointer; color: #555; transition: 0.2s;
        }
        .option-btn:active { background: #fff5f5; border-color: var(--accent); }

    </style>
</head>
<body>

    <div id="start-page" class="page">
        <h1 style="color: #5d5d5d; font-size: 1.8rem; margin-bottom: 20px;">감정쓰레기통</h1>
        <div style="font-size: 6rem; cursor: pointer; margin-bottom: 30px;" onclick="goToGamePage()">🗑️</div>
        <div class="description-box">
            <p>버리고 싶은 기억을 던지세요.<br>당신의 마음이 가벼워질 때까지.</p>
        </div>
    </div>

    <div id="game-page" class="page">
        <div id="canvas-container">
            <textarea id="text-input" placeholder="없애고 싶은 생각이나 감정을 이 곳에 털어 놓으세요. 작성한 내용은 저장되지 않습니다."></textarea>
            <canvas id="main-canvas"></canvas>
            <canvas id="hidden-texture" style="display:none;"></canvas>
        </div>
        <button id="btn-submit" class="submit-btn" onclick="completeWriting()">✍️ 작성 완료</button>
    </div>

    <div id="options-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#444;">이 기억을 어떻게 처리할까요?</h3>
            <div class="option-list">
                <button class="option-btn" onclick="selectAction('tear')">✂️ 1. 산산조각 내기 (Swipe)</button>
                <button class="option-btn" onclick="selectAction('trash')">🗑️ 2. 쓰레기통에 던지기</button>
            </div>
        </div>
    </div>

    <script>
        // 무한 절단을 위한 기하학 알고리즘
        const PolygonClipper = (() => {
            const getIntersection = (A, B, C, D) => {
                const a1 = B.y - A.y; const b1 = A.x - B.x; const c1 = a1 * A.x + b1 * A.y;
                const a2 = D.y - C.y; const b2 = C.x - D.x; const c2 = a2 * C.x + b2 * C.y;
                const det = a1 * b2 - a2 * b1;
                if (det === 0) return null;
                const x = (b2 * c1 - b1 * c2) / det;
                const y = (a1 * c2 - a2 * c1) / det;
                const minX = Math.min(C.x, D.x) - 0.1; const maxX = Math.max(C.x, D.x) + 0.1;
                const minY = Math.min(C.y, D.y) - 0.1; const maxY = Math.max(C.y, D.y) + 0.1;
                if (x >= minX && x <= maxX && y >= minY && y <= maxY) return {x, y};
                return null;
            };
            const splitPolygon = (vertices, A, B) => {
                const p1 = [], p2 = [];
                for (let i = 0; i < vertices.length; i++) {
                    const cur = vertices[i]; const next = vertices[(i + 1) % vertices.length];
                    const side = (B.x - A.x) * (cur.y - A.y) - (B.y - A.y) * (cur.x - A.x);
                    if (side >= 0) p1.push(cur); if (side <= 0) p2.push(cur); 
                    const intersect = getIntersection(A, B, cur, next);
                    if (intersect) {
                        const distCur = Math.hypot(intersect.x - cur.x, intersect.y - cur.y);
                        const distNext = Math.hypot(intersect.x - next.x, intersect.y - next.y);
                        if (distCur > 0.1 && distNext > 0.1) { p1.push(intersect); p2.push(intersect); }
                    }
                }
                if (p1.length >= 3 && p2.length >= 3) return [p1, p2];
                return null;
            };
            return { splitPolygon };
        })();

        class PaperPiece {
            constructor(vertices, dx = 0, dy = 0, vx = 0, vy = 0) {
                this.vertices = vertices; this.dx = dx; this.dy = dy;
                this.vx = vx; this.vy = vy; this.alpha = 1; 
                this.delay = 120; // 체공 시간
            }
            update() {
                if(this.vx === 0 && this.vy === 0) return;
                
                this.delay--;
                if (this.delay <= 0) {
                    this.vy += 0.02; // 무중력에 가까운 천천히 떨어짐
                    this.alpha -= 0.003; 
                } else {
                    this.vx *= 0.88; this.vy *= 0.88;
                }

                const currentX = 160 + this.dx; const currentY = 225 + this.dy;
                // 보이지 않는 유리벽 (화면 밖 탈출 방지)
                if (currentX < 20) { this.vx = Math.abs(this.vx) * 0.5; this.dx += 1; }
                if (currentX > 300) { this.vx = -Math.abs(this.vx) * 0.5; this.dx -= 1; }
                if (currentY < 20) { this.vy = Math.abs(this.vy) * 0.5; this.dy += 1; }

                this.dx += this.vx; this.dy += this.vy;
            }
            draw(ctx, texture) {
                if (this.alpha <= 0) return; ctx.save();
                ctx.globalAlpha = this.alpha; 
                ctx.translate(this.dx, this.dy); ctx.beginPath();
                this.vertices.forEach((v, i) => { if (i === 0) ctx.moveTo(v.x, v.y); else ctx.lineTo(v.x, v.y); });
                ctx.closePath(); ctx.clip(); ctx.drawImage(texture, 0, 0); ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();
            }
        }

        const mainCanvas = document.getElementById('main-canvas');
        const mainCtx = mainCanvas.getContext('2d');
        const textureCanvas = document.getElementById('hidden-texture');
        const textureCtx = textureCanvas.getContext('2d');
        const input = document.getElementById('text-input');
        const modal = document.getElementById('options-modal');
        const cw = 320, ch = 450;
        
        let selectedAction = null; 
        let isDrawing = false; 
        let swipeStartX = 0, swipeStartY = 0;
        let swipeCurrX = 0, swipeCurrY = 0;
        let paperPieces = []; 
        let isGameFinished = false;

        mainCanvas.width = cw; mainCanvas.height = ch; textureCanvas.width = cw; textureCanvas.height = ch;

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            let words = text.split(''); let line = '';
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n];
                if (context.measureText(testLine).width > maxWidth && n > 0) {
                    context.fillText(line, x, y); line = words[n]; y += lineHeight;
                } else { line = testLine; }
            }
            context.fillText(line, x, y); return y; 
        }

        function goToGamePage() {
            document.getElementById('start-page').style.opacity = '0'; document.getElementById('start-page').style.visibility = 'hidden'; document.getElementById('game-page').style.opacity = '1'; document.getElementById('game-page').style.visibility = 'visible';
        }

        function completeWriting() {
            if(input.value.trim() === "") return alert("내용을 입력해주세요.");
            textureCtx.fillStyle = "white"; textureCtx.fillRect(0, 0, cw, ch);
            textureCtx.fillStyle = "#f5f5f5"; for(let y = 35; y < ch; y += 36) textureCtx.fillRect(0, y, cw, 1);
            textureCtx.fillStyle = "#5d5d5d"; textureCtx.font = "18px 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif";
            
            const padding = 25; const maxWidth = cw - (padding * 2); const lineHeight = 35; let currentY = 50;
            input.value.split('\n').forEach(para => {
                currentY = wrapText(textureCtx, para, padding, currentY, maxWidth, lineHeight);
                currentY += lineHeight; 
            });
            
            input.style.visibility = 'hidden'; document.getElementById('btn-submit').style.visibility = 'hidden'; modal.style.display = 'flex';
        }

        function selectAction(type) {
            selectedAction = type; modal.style.display = 'none';
            if(type === 'tear') {
                paperPieces.push(new PaperPiece([ {x:0,y:0},{x:cw,y:0},{x:cw,y:ch},{x:0,y:ch} ], 0, 0, 0, 0));
                alert("화면을 길게 그어서 종이를 반으로 잘라보세요!\n(1번 그으면 2조각, 2번 그으면 4조각)");
                gameLoop(); 
            } else if(type === 'trash') {
                document.getElementById('canvas-container').style.transition = "1s"; document.getElementById('canvas-container').style.transform = "scale(0.1) rotate(720deg) translateY(1000px)"; document.getElementById('canvas-container').style.opacity = "0";
                setTimeout(() => { alert("쓰레기통에 처박았습니다.\n마음이 가벼워지셨길 바랍니다."); location.reload(); }, 1000);
            }
        }

        function triggerVibration() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20); }

        function getMousePos(e) { 
            const rect = mainCanvas.getBoundingClientRect(); 
            const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
            const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
            return { x: clientX - rect.left, y: clientY - rect.top }; 
        }

        // ★ 로직 수정 1: 터치 시작 시점 저장
        function handleStart(e) { 
            if(!selectedAction || selectedAction !== 'tear') return; 
            if(e.cancelable) e.preventDefault(); 
            isDrawing = true; 
            const pos = getMousePos(e);
            swipeStartX = pos.x; swipeStartY = pos.y;
            swipeCurrX = pos.x; swipeCurrY = pos.y;
        }

        // ★ 로직 수정 2: 터치 이동 시에는 궤적(선)만 그림
        function handleMove(e) {
            if(!isDrawing || selectedAction !== 'tear' || isGameFinished) return; 
            if(e.cancelable) e.preventDefault(); 
            const pos = getMousePos(e);
            swipeCurrX = pos.x; swipeCurrY = pos.y;
        }

        // ★ 로직 수정 3: 터치 종료 시(손을 뗄 때) 딱 한 번만 절단 실행!
        function handleEnd(e) { 
            if(!isDrawing || selectedAction !== 'tear') return;
            isDrawing = false; 

            const dist = Math.hypot(swipeCurrX - swipeStartX, swipeCurrY - swipeStartY);
            
            // 30px 이상 시원하게 그었을 때만 잘리도록 설정
            if(dist > 30) { 
                let slicedSucceeded = false;
                const newPieces = [];
                for (let i = paperPieces.length - 1; i >= 0; i--) {
                    const p = paperPieces[i];
                    
                    // 시작점과 끝점을 이은 '하나의 선'으로만 절단
                    const localA = { x: swipeStartX - p.dx, y: swipeStartY - p.dy };
                    const localB = { x: swipeCurrX - p.dx, y: swipeCurrY - p.dy };
                    const result = PolygonClipper.splitPolygon(p.vertices, localA, localB);
                    
                    if (result) {
                        slicedSucceeded = true;
                        paperPieces.splice(i, 1);
                        
                        // 자르는 선과 수직 방향으로 밀어내는 힘 계산 (깔끔하게 벌어지도록)
                        const sliceDx = swipeCurrX - swipeStartX; 
                        const sliceDy = swipeCurrY - swipeStartY;
                        const len = Math.hypot(sliceDx, sliceDy);
                        const pushX = -(sliceDy / len) * 1.5; 
                        const pushY = (sliceDx / len) * 1.5;
                        
                        newPieces.push(new PaperPiece(result[0], p.dx, p.dy, p.vx + pushX, p.vy + pushY)); 
                        newPieces.push(new PaperPiece(result[1], p.dx, p.dy, p.vx - pushX, p.vy - pushY));
                    }
                }

                if (slicedSucceeded) {
                    paperPieces.push(...newPieces); 
                    triggerVibration(); 
                }
                
                // 64조각 이상으로 산산조각 내면 게임 완료
                if(paperPieces.length > 64) { 
                    isGameFinished = true; 
                    setTimeout(() => { alert("가루가 되도록 박살 냈습니다.\n수고하셨습니다."); location.reload(); }, 1500); 
                }
            }
        }

        function gameLoop() {
            if(isGameFinished && paperPieces.length === 0) return; 
            requestAnimationFrame(gameLoop);
            mainCtx.clearRect(0, 0, cw, ch);
            
            // 1. 종이 조각 그리기
            for (let i = paperPieces.length - 1; i >= 0; i--) {
                const piece = paperPieces[i]; piece.update(); piece.draw(mainCtx, textureCanvas);
                if (piece.alpha <= 0 || piece.dy > 1200) paperPieces.splice(i, 1);
            }

            // 2. ★ 검술(슬래시) 궤적 그리기 (드래그 중일 때만)
            if (isDrawing && selectedAction === 'tear') {
                mainCtx.beginPath();
                mainCtx.moveTo(swipeStartX, swipeStartY);
                mainCtx.lineTo(swipeCurrX, swipeCurrY);
                mainCtx.strokeStyle = "rgba(255, 82, 82, 0.7)"; // 반투명한 빨간 칼자국
                mainCtx.lineWidth = 4;
                mainCtx.lineCap = "round";
                mainCtx.stroke();
            }
        }

        mainCanvas.addEventListener('mousedown', handleStart);
        mainCanvas.addEventListener('touchstart', handleStart, {passive:false});
        window.addEventListener('mousemove', handleMove, {passive:false});
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
